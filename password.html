<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Category Intelligence — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;
  background:#F7F8FA;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.card{
  background:#fff;
  border:1px solid #E4E7EC;
  border-radius:16px;
  padding:40px 48px;
  width:100%;
  max-width:400px;
  box-shadow:0 4px 24px rgba(0,0,0,.08);
  text-align:center;
}
.logo{
  font-size:20px;
  font-weight:700;
  color:#111827;
  margin-bottom:6px;
}
.logo span{color:#2563EB}
.subtitle{
  font-size:13px;
  color:#9CA3AF;
  margin-bottom:32px;
}
label{
  display:block;
  text-align:left;
  font-size:12px;
  font-weight:600;
  color:#4B5563;
  letter-spacing:.4px;
  text-transform:uppercase;
  margin-bottom:6px;
}
.input-wrap{position:relative}
input[type=password]{
  width:100%;
  padding:11px 44px 11px 14px;
  border:1px solid #E4E7EC;
  border-radius:8px;
  font-size:14px;
  font-family:'Inter',sans-serif;
  color:#111827;
  background:#F9FAFB;
  outline:none;
  transition:border .15s;
  letter-spacing:3px;
}
input[type=password]:focus{
  border-color:#2563EB;
  background:#fff;
}
.toggle-pw{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#9CA3AF;
  font-size:16px;
  user-select:none;
  border:none;
  background:transparent;
  line-height:1;
}
.toggle-pw:hover{color:#4B5563}
.btn{
  width:100%;
  margin-top:20px;
  padding:12px;
  background:#2563EB;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:14px;
  font-weight:600;
  font-family:'Inter',sans-serif;
  cursor:pointer;
  transition:background .15s;
}
.btn:hover{background:#1D4ED8}
.btn:active{background:#1E40AF}
.error{
  display:none;
  margin-top:12px;
  padding:10px 14px;
  background:#FEF2F2;
  border:1px solid #FECACA;
  border-radius:6px;
  color:#DC2626;
  font-size:12px;
  font-weight:500;
}
.footer{
  margin-top:28px;
  font-size:11px;
  color:#D1D5DB;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Category <span>Intelligence</span></div>
  <div class="subtitle">Enter password to access the dashboard</div>

  <label for="pw">Password</label>
  <div class="input-wrap">
    <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')checkPassword()"/>
    <button class="toggle-pw" onclick="togglePw()" tabindex="-1" title="Show/hide">👁</button>
  </div>

  <button class="btn" onclick="checkPassword()">Access Dashboard</button>
  <div class="error" id="err">Incorrect password. Please try again.</div>

  <div class="footer">NatHabit Internal Use Only</div>
</div>

<script>
  // ── Set your password here ──────────────────────────────────────
  const PASSWORD = 'Nathabit@123';
  // ───────────────────────────────────────────────────────────────

  const SESSION_KEY = 'ci_auth';

  // If already authenticated this session, go straight to dashboard
  if (sessionStorage.getItem(SESSION_KEY) === 'true') {
    window.location.replace('/dashboard.html');
  }

  function checkPassword() {
    const val = document.getElementById('pw').value;
    const err = document.getElementById('err');
    if (val === PASSWORD) {
      sessionStorage.setItem(SESSION_KEY, 'true');
      window.location.replace('/dashboard.html');
    } else {
      err.style.display = 'block';
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  }

  function togglePw() {
    const inp = document.getElementById('pw');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
